<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Aura AI — Aqlli AI Yordamchi</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#05050f;--bg2:#0c0c1e;--p1:#7c6dfa;--p2:#00d4ff;--p3:#ff6b9d;--gold:#ffd700;--glass:rgba(255,255,255,0.04);--border:rgba(255,255,255,0.08);--text:#e8e8f0;--muted:#6b6b8a;--sidebar:260px}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;height:100vh;display:flex;overflow:hidden}

/* SIDEBAR */
.sidebar{width:var(--sidebar);min-width:var(--sidebar);height:100vh;background:rgba(8,8,20,0.95);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:1rem;z-index:50}
.sidebar-logo{font-family:'Space Grotesk',sans-serif;font-size:1.4rem;font-weight:800;background:linear-gradient(135deg,var(--p1),var(--p2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-decoration:none;display:block;padding:.5rem;margin-bottom:1rem;text-align:center}
.new-chat-btn{width:100%;padding:.85rem;border-radius:12px;background:linear-gradient(135deg,var(--p1),var(--p2));color:#fff;font-size:.9rem;font-weight:700;border:none;cursor:pointer;font-family:'Space Grotesk',sans-serif;transition:.3s;margin-bottom:1rem;display:flex;align-items:center;justify-content:center;gap:.5rem}
.new-chat-btn:hover{box-shadow:0 4px 20px rgba(124,109,250,0.4)}
.nav-menu{display:flex;flex-direction:column;gap:.5rem;margin-bottom:auto}
.nav-item{padding:.75rem 1rem;border-radius:10px;color:var(--muted);text-decoration:none;font-size:.85rem;display:flex;align-items:center;gap:.75rem;transition:.2s}
.nav-item:hover{background:var(--glass);color:var(--text)}
.nav-item.active{background:rgba(124,109,250,0.1);color:var(--p1);border:1px solid rgba(124,109,250,0.2)}
.sidebar-user{padding:.75rem;background:var(--glass);border-radius:12px;border:1px solid var(--border);display:flex;align-items:center;gap:.6rem;margin-top:1rem}
.user-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--p1),var(--p2));display:flex;align-items:center;justify-content:center;font-size:1rem;font-weight:700}
.user-info{overflow:hidden;flex:1}
.user-name{font-size:.85rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.user-plan{font-size:.75rem;color:var(--gold)}
.coins-badge{font-size:.75rem;color:var(--gold);background:rgba(255,215,0,0.1);border-radius:50px;padding:.2rem .5rem}

/* MAIN */
.chat-main{flex:1;display:flex;flex-direction:column;height:100vh;min-width:0;position:relative}

/* TOPBAR */
.topbar{padding:1rem 1.5rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:rgba(5,5,15,0.9);backdrop-filter:blur(10px);flex-shrink:0}
.model-select{padding:.5rem 1rem;border-radius:10px;background:var(--glass);border:1px solid var(--border);color:var(--text);font-size:.85rem;cursor:pointer;outline:none;font-family:'Inter',sans-serif}
.model-select option{background:#0e0e20;color:var(--text)}
.topbar-right{display:flex;align-items:center;gap:1rem}
.clear-btn{padding:.4rem .8rem;border-radius:8px;background:transparent;border:1px solid var(--border);color:var(--muted);font-size:.8rem;cursor:pointer;transition:.3s}
.clear-btn:hover{border-color:var(--p3);color:var(--p3)}

/* MESSAGES */
.messages-wrap{flex:1;overflow-y:auto;padding:2rem}
.messages-wrap::-webkit-scrollbar{width:4px}
.messages-wrap::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.messages-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;text-align:center}
.empty-logo{font-family:'Space Grotesk',sans-serif;font-size:3rem;font-weight:800;background:linear-gradient(135deg,var(--p1),var(--p2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:1rem}
.empty-title{font-family:'Space Grotesk',sans-serif;font-size:1.5rem;font-weight:700;margin-bottom:.5rem}
.empty-sub{color:var(--muted);font-size:.95rem;max-width:450px;margin-bottom:2rem;line-height:1.6}
.suggestions{display:grid;grid-template-columns:1fr 1fr;gap:1rem;max-width:600px}
.suggestion{padding:1rem;background:var(--glass);border:1px solid var(--border);border-radius:14px;font-size:.85rem;color:var(--muted);cursor:pointer;text-align:left;transition:.3s;font-family:'Inter',sans-serif}
.suggestion:hover{border-color:rgba(124,109,250,0.3);color:var(--text);background:rgba(124,109,250,0.05);transform:translateY(-2px)}

.msg-row{display:flex;gap:1rem;margin-bottom:2rem;align-items:flex-start}
.msg-row.user{flex-direction:row-reverse}
.msg-avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0}
.msg-avatar.ai{background:linear-gradient(135deg,var(--p1),var(--p2))}
.msg-avatar.user{background:var(--glass);border:1px solid var(--border)}
.msg-content{max-width:75%;min-width:0}
.msg-bubble{padding:1rem 1.25rem;border-radius:18px;font-size:.95rem;line-height:1.6;font-family:'Inter',sans-serif}
.msg-row.ai .msg-bubble{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:4px 18px 18px 18px}
.msg-row.user .msg-bubble{background:linear-gradient(135deg,var(--p1),var(--p2));color:#fff;border-radius:18px 18px 4px 18px}
.msg-meta{font-size:.7rem;color:var(--muted);margin-top:.4rem;display:flex;gap:.5rem;align-items:center}
.msg-row.user .msg-meta{justify-content:flex-end}
.msg-bubble pre{margin:.75rem 0;border-radius:10px;overflow:hidden;background:#0d0d16 !important;border:1px solid var(--border)}
.msg-bubble code{font-family:monospace;font-size:.9em}
.msg-bubble p{margin-bottom:.5em}
.msg-bubble p:last-child{margin-bottom:0}

/* Typing */
.typing-row{display:flex;gap:1rem;margin-bottom:2rem;align-items:flex-start}
.typing-bubble{padding:1rem 1.25rem;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:4px 18px 18px 18px;display:flex;gap:6px;align-items:center}
.dot{width:6px;height:6px;border-radius:50%;background:var(--p2);animation:bounce .8s infinite}
.dot:nth-child(2){animation-delay:.15s}
.dot:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-6px)}}

/* INPUT */
.input-area{padding:1.5rem;background:rgba(5,5,15,0.9);flex-shrink:0}
.input-box{display:flex;gap:1rem;align-items:flex-end;background:var(--glass);border:1px solid var(--border);border-radius:20px;padding:.5rem .5rem .5rem 1rem;transition:.3s}
.input-box:focus-within{border-color:var(--p1);background:rgba(255,255,255,0.06)}
textarea{flex:1;background:transparent;border:none;color:var(--text);font-size:.95rem;font-family:'Inter',sans-serif;padding:.5rem 0;resize:none;outline:none;max-height:200px;min-height:24px;line-height:1.5}
textarea::placeholder{color:var(--muted)}
.send-btn{width:44px;height:44px;border-radius:16px;background:linear-gradient(135deg,var(--p1),var(--p2));border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1.2rem;color:#fff;transition:.3s;flex-shrink:0}
.send-btn:hover:not(:disabled){transform:scale(1.05);box-shadow:0 4px 15px rgba(124,109,250,0.4)}
.send-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.input-footer{text-align:center;margin-top:.75rem;font-size:.7rem;color:var(--muted)}

@media(max-width:768px){.sidebar{display:none}.suggestions{grid-template-columns:1fr}}
</style>
</head>
<body>

<div class="sidebar">
  <a href="/" class="sidebar-logo">Aura AI</a>
  <button class="new-chat-btn" onclick="clearChat()">➕ Yangi suhbat</button>
  
  <div class="nav-menu">
    <a href="/ai.html" class="nav-item active">💬 AI Chat</a>
    <a href="/imagine.html" class="nav-item">🎨 Imagine (Rasm)</a>
    <a href="/slides.html" class="nav-item">📊 Slides (Slaydlar)</a>
    <a href="/tasks.html" class="nav-item">🎯 Coin yig'ish</a>
    <a href="/plans.html" class="nav-item">🚀 Tariflar</a>
    <a href="/profile.html" class="nav-item">👤 Profil</a>
  </div>

  <div class="sidebar-user" id="sidebarUser">
    <div class="user-avatar" id="avatarChar">?</div>
    <div class="user-info">
      <div class="user-name" id="userName">Mehmon</div>
      <div class="user-plan" id="userPlan">Free</div>
    </div>
    <div class="coins-badge" id="userCoins">🪙 0</div>
  </div>
</div>

<div class="chat-main">
  <div class="topbar">
    <select class="model-select" id="modelSelect"></select>
    <div class="topbar-right">
      <button class="clear-btn" onclick="clearHistoryReq()">🗑️ Tarixni tozalash</button>
    </div>
  </div>

  <div class="messages-wrap" id="messagesWrap">
    <!-- Messages inject here -->
  </div>

  <div class="input-area">
    <div class="input-box">
      <textarea id="msgInput" placeholder="Aura AI ga yozing..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
    </div>
    <div class="input-footer">Aura AI — Nurbek Qulmamatov tomonidan yaratilgan 🚀</div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
let isLoading=false;
const wrap=document.getElementById('messagesWrap');

// Init User
fetch('/api/auth/me',{credentials:'include'}).then(r=>r.json()).then(d=>{
  if(d.logged_in){
    document.getElementById('userName').textContent=d.user.name;
    document.getElementById('userPlan').textContent=d.user.plan.toUpperCase();
    document.getElementById('userCoins').textContent='🪙 '+d.user.coins;
    document.getElementById('avatarChar').textContent=d.user.name.charAt(0).toUpperCase();
  } else {
    window.location.href='/login.html';
  }
});

// Init Models
fetch('/api/models').then(r=>r.json()).then(d=>{
  const sel=document.getElementById('modelSelect');
  d.models.forEach(m=>{
    const opt=document.createElement('option');
    opt.value=m.id;
    opt.textContent=`${m.name} ${m.locked?'(Qulflangan 🔒)':''}`;
    if(m.locked) opt.disabled=true;
    sel.appendChild(opt);
  });
});

// Init History
function loadHistory(){
  fetch('/api/chat/history',{credentials:'include'}).then(r=>r.json()).then(d=>{
    wrap.innerHTML='';
    if(!d.history || d.history.length===0){
      showEmptyState();
    } else {
      d.history.forEach(m=>renderMessage(m.role, m.content, false));
      wrap.scrollTop=wrap.scrollHeight;
    }
  });
}
loadHistory();

function showEmptyState(){
  wrap.innerHTML=`
    <div class="messages-empty" id="emptyState">
      <div class="empty-logo">✨ Aura AI</div>
      <div class="empty-title">Nima haqida gaplashamiz?</div>
      <div class="empty-sub">Men Aura AI — O'zbekistonning eng aqlli yordamchisiman.</div>
      <div class="suggestions">
        <div class="suggestion" onclick="suggest(this)">💡 Python'da bot yozib ber</div>
        <div class="suggestion" onclick="suggest(this)">✍️ Motivatsion xat yozishga yordam ber</div>
        <div class="suggestion" onclick="suggest(this)">🔍 Kvant kompyuterlari nima?</div>
        <div class="suggestion" onclick="suggest(this)">🧮 Murakkab masalani yechish</div>
      </div>
    </div>`;
}

function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,200)+'px';}
function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}}
function suggest(btn){document.getElementById('msgInput').value=btn.textContent.slice(2).trim();sendMessage();}

async function clearHistoryReq(){
  if(confirm("Tarixni butunlay tozalaysizmi?")){
    await fetch('/api/chat/clear',{method:'POST',credentials:'include'});
    loadHistory();
  }
}
function clearChat(){ wrap.innerHTML=''; showEmptyState(); }

function renderMessage(role, content, animate=false){
  const empty=document.getElementById('emptyState');
  if(empty) empty.remove();
  
  const row=document.createElement('div');
  row.className='msg-row '+(role==='user'?'user':'ai');
  const avatar=role==='user'?'👤':'✨';
  
  marked.setOptions({breaks:true, gfm:true});
  const html = marked.parse(content);
  
  row.innerHTML=`
  <div class="msg-avatar ${role==='user'?'user':'ai'}">${avatar}</div>
  <div class="msg-content">
    <div class="msg-bubble">${html}</div>
    <div class="msg-meta">${role==='assistant'?'Aura AI':''}</div>
  </div>`;
  wrap.appendChild(row);
  row.querySelectorAll('pre code').forEach(block=>hljs.highlightElement(block));
  if(animate) wrap.scrollTop=wrap.scrollHeight;
}

function showTyping(){
  const row=document.createElement('div');
  row.className='typing-row';row.id='typingRow';
  row.innerHTML='<div class="msg-avatar ai">✨</div><div class="typing-bubble"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
  wrap.appendChild(row);wrap.scrollTop=wrap.scrollHeight;
}
function hideTyping(){const t=document.getElementById('typingRow');if(t)t.remove();}

async function sendMessage(){
  if(isLoading) return;
  const input=document.getElementById('msgInput');
  const msg=input.value.trim();
  if(!msg) return;
  
  isLoading=true;
  document.getElementById('sendBtn').disabled=true;
  input.value=''; input.style.height='auto';

  renderMessage('user', msg, true);
  showTyping();

  try {
    const empty=document.getElementById('emptyState');if(empty)empty.remove();
    
    // Setup Streaming Bubble
    const bubbleId = 'stream-' + Date.now();
    const row=document.createElement('div');row.className='msg-row ai';
    row.innerHTML=`<div class="msg-avatar ai">✨</div><div class="msg-content"><div class="msg-bubble" id="${bubbleId}"></div></div>`;
    wrap.appendChild(row);
    const bubble=document.getElementById(bubbleId);
    
    hideTyping();
    let fullText='';
    
    const resp = await fetch('/api/chat/stream',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        message: msg,
        model: document.getElementById('modelSelect').value
      }),
      credentials:'include'
    });
    
    const reader=resp.body.getReader();
    const decoder=new TextDecoder();
    let buffer='';
    while(true){
      const {value,done}=await reader.read();
      if(done)break;
      buffer += decoder.decode(value,{stream:true});
      let parts = buffer.split('\n\n');
      buffer = parts.pop();
      for(let part of parts){
        const lines=part.split('\n');
        for(let line of lines){
          if(line.startsWith('data: ') && line!=='data: [DONE]'){
            try{
              const j=JSON.parse(line.slice(6));
              if(j.content){
                fullText+=j.content;
                bubble.innerHTML=marked.parse(fullText);
                wrap.scrollTop=wrap.scrollHeight;
              }
            }catch(e){console.error('SSE Error:', e);}
          }
        }
      }
    }bubble.querySelectorAll('pre code').forEach(b=>hljs.highlightElement(b));
    
  } catch(e) {
    hideTyping();
    renderMessage('assistant', '⚠️ Xato yuz berdi: ' + e.message, true);
  }
  
  isLoading=false;
  document.getElementById('sendBtn').disabled=false;
  input.focus();
}
</script>
</body>
</html>
